databaseChangeLog:
  - changeSet:
      id: 003-create-records-table
      author: timofey
      changes:
        - createTable:
            tableName: records
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: habit_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_records_habit
                    nullable: false
                    references: habits(id)
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false